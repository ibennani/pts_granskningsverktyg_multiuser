name: sessionversion

services:
  # Databasen
  postgres:
    image: postgres:16-alpine
    container_name: granskningsverktyget-db
    environment:
      POSTGRES_USER: granskning
      POSTGRES_PASSWORD: granskning
      POSTGRES_DB: granskningsverktyget
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - private-net
    restart: always

  # Ollama (Din befintliga motor)
  ollama:
    image: ollama/ollama
    container_name: ollama-final
    ports:
      - "127.0.0.1:11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=http://localhost:*,https://*.ngrok-free.app,https://*.ngrok-free.dev
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - private-net
    restart: always

  # Open WebUI (Det grafiska gränssnittet)
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: sessionversion-open-webui
    ports:
      - "127.0.0.1:3080:8080" # Nås på http://localhost:3080
    environment:
      - OLLAMA_BASE_URL=http://ollama-final:11434 # Viktigt: pekar på Ollama-containern
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
    volumes:
      - webui_data:/app/backend/data
    networks:
      - private-net
    depends_on:
      - ollama
    restart: always

networks:
  private-net:
    driver: bridge

volumes:
  pgdata:
  ollama_data:
  webui_data: