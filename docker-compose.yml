name: granskningsverktyget

services:
  # Databasen (PostgreSQL)
  postgres:
    image: postgres:16-alpine
    container_name: granskningsverktyget-db
    environment:
      POSTGRES_USER: granskning
      POSTGRES_PASSWORD: granskning
      POSTGRES_DB: granskningsverktyget
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U granskning -d granskningsverktyget"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # Ollama med GPU-stöd och Cursor-optimering
  ollama:
    image: ollama/ollama
    container_name: ollama-final
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_NUM_PARALLEL=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ollama_data:/root/.ollama
    restart: always

volumes:
  pgdata:
    name: sessionversion_pgdata
  ollama_data: