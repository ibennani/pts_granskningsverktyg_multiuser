name: sessionversion

services:
  # Databasen (PostgreSQL)
  postgres:
    image: postgres:16-alpine
    container_name: granskningsverktyget-db
    environment:
      POSTGRES_USER: granskning
      POSTGRES_PASSWORD: granskning
      POSTGRES_DB: granskningsverktyget
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U granskning -d granskningsverktyget"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - private-net
    restart: always

  # Ollama med GPU-stöd - Isolerad till localhost
  ollama:
    image: ollama/ollama
    container_name: ollama-final
    ports:
      - "127.0.0.1:11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=http://localhost:*,https://*.ngrok-free.app,https://*.ngrok-free.dev
      - OLLAMA_KEEP_ALIVE=24h
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - private-net
    restart: always

networks:
  private-net:
    driver: bridge

volumes:
  pgdata:
  ollama_data: