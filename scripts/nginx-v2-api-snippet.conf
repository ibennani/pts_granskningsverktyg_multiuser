# Snippet som MÅSTE finnas i nginx-config för att DELETE/PUT/PATCH ska fungera.
# Placeras INOM server { } för 443, FÖRE location /v2/ och location /.
#
# Om du redan har location /v2/api - ersätt med detta block:

    # V2 API – rewrite säkerställer att /v2/api/audits/123 -> /api/audits/123 (annars 404 vid DELETE)
    location /v2/api {
        rewrite ^/v2/api(.*)$ /api$1 break;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Name $http_x_user_name;
    }
