# Lägg till dessa location-block i server { } för 443 i ux-granskning.conf
# Placeras före "location / {"
# VIKTIGT: /v2/api/ MÅSTE komma före /v2/ så att DELETE/PUT/PATCH inte fångas av try_files

    # rewrite säkerställer att /v2/api/audits/123 -> /api/audits/123 (annars 404)
    location /v2/api {
        rewrite ^/v2/api(.*)$ /api$1 break;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Name $http_x_user_name;
    }

    # Backupfiler (proxas till Node som serverar GV_BACKUP_DIR)
    location /v2/backup {
        rewrite ^/v2/backup(.*)$ /backup$1 break;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # V2 - ny version med backend
    location /v2/ {
        alias /var/www/granskningsverktyget-v2/dist/;
        try_files $uri $uri/ /v2/index.html;
    }
