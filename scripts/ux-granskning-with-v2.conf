server {
    listen 80;
    server_name ux-granskningsverktyg.pts.ad;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ux-granskningsverktyg.pts.ad;

    root /var/www/ux-granskningsverktyg;
    index index.html index.htm;

    ssl_certificate /etc/nginx/ssl/pts-ad.crt;
    ssl_certificate_key /etc/nginx/ssl/privkey.key;

    ssl_protocols TLSv1.2;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Optional security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # V2 API – MÅSTE komma före /v2/ så att DELETE/PUT/PATCH inte fångas av try_files
    # rewrite säkerställer att /v2/api/audits/123 -> /api/audits/123 (annars 404)
    location /v2/api {
        rewrite ^/v2/api(.*)$ /api$1 break;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Name $http_x_user_name;
    }

    # WebSocket för realtidssynkronisering (granskningar/regelfiler)
    # rewrite /v2/ws -> /ws eftersom backend lyssnar på /ws
    location /v2/ws {
        rewrite ^/v2/ws$ /ws break;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # build-info.js – aldrig cache för versionskontroll
    location = /v2/build-info.js {
        alias /var/www/granskningsverktyget-v2/build-info.js;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # index.html – aldrig cache, garanterar att vanlig refresh ger ny version efter deploy
    location = /v2/index.html {
        alias /var/www/granskningsverktyget-v2/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # V2 - ny version med backend
    # /v2/... -> /var/www/granskningsverktyget-v2/...
    location /v2/ {
        alias /var/www/granskningsverktyget-v2/;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ /v2/index.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
